name: Real-time News Bot Scraper

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push db.json changes back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetches the latest commits to avoid git push conflicts
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run news scraper
        run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SINGLE_RUN: 'true'
          POLL_INTERVAL_MINUTES: 15
          DRY_RUN: 'false'

      - name: Commit and Push Database updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Check if db.json has been modified
          if git status --porcelain | grep -q "db.json"; then
            echo "Database changed. Committing updates..."
            git add db.json
            git commit -m "chore: update news database cache [skip ci]"
            git push origin main
          else
            echo "No new articles added to database. Skipping commit."
          fi
